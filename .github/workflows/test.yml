name: Tester

on:
  push:
    branches: ["main", "feature/**", "fix/**", "bump/**", "docs/**"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer avhengigheter
        run: |
          pip install -e ".[dev]"

      - name: Kjør tester
        run: pytest tests/ -v
