site_name: Wenche
site_description: Enkel innsending av årsregnskap, skattemelding og aksjonærregisteroppgave til Altinn
site_url: https://olefredrik.github.io/Wenche/
repo_url: https://github.com/olefredrik/Wenche
repo_name: olefredrik/Wenche

theme:
  name: material
  language: nb
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Bytt til mørk modus
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Bytt til lys modus
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - toc.integrate

nav:
  - Hjem: index.md
  - Installasjon: installasjon.md
  - Oppsett: oppsett.md
  - Bruk: bruk.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
